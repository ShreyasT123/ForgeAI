name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run test:lint
      - name: Build
        run: npm run build
      - name: Run Tests
        run: npm test
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
